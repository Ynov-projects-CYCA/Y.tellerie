<div class="payment-container">
  <app-card class="payment-card">
    <div class="content">
      <svg lucideXCircle class="cancel-icon"></svg>
      <h1>Paiement annulé</h1>
      <p>Le processus de paiement a été interrompu. Votre réservation n'a pas été confirmée.</p>
      
      <div class="actions">
        @if (bookingId()) {
          <button 
            appButton 
            variant="primary" 
            size="full" 
            (click)="retryPayment()"
            [disabled]="isRetrying()"
          >
            {{ isRetrying() ? 'Chargement...' : 'Réessayer le paiement' }}
            <svg lucideRefreshCw class="btn-icon" [class.animate-spin]="isRetrying()"></svg>
          </button>
        } @else {
          <button appButton variant="primary" [routerLink]="['/client']" size="full">
            Réessayer la réservation
            <svg lucideRefreshCw class="btn-icon"></svg>
          </button>
        }

        <button appButton variant="outline" [routerLink]="['/client/historique']" size="full">
          Voir mon historique
          <svg lucideHistory class="btn-icon"></svg>
        </button>
      </div>
    </div>
  </app-card>
</div>
