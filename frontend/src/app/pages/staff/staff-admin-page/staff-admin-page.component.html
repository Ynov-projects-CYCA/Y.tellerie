<div class="staff-page" *ngIf="hasStaffAccess; else accessDenied">
  <div class="staff-page__header">
    <div class="admin-heading">
      <div class="admin-heading__icon">🛡️</div>
      <div>
        <h1 class="staff-page__title">Administration</h1>
        <p class="staff-page__subtitle">Gestion du personnel</p>
      </div>
    </div>
  </div>

  <div class="stats-grid stats-grid--three">
    <div class="card">
      <div class="card__label">Total Personnel</div>
      <div class="card__value">{{ employees.length }}</div>
    </div>

    <div class="card">
      <div class="card__label">Actifs</div>
      <div class="card__value card__value--success">{{ activeCount }}</div>
    </div>

    <div class="card">
      <div class="card__label">Inactifs</div>
      <div class="card__value card__value--danger">{{ inactiveCount }}</div>
    </div>
  </div>

  <div class="card">
  <app-generic-data-table
      title="Tableau du personnel"
      subtitle="Recherche globale, tri et filtre par champ"
      addButtonLabel="Ajouter un employé"
      [data]="filteredEmployees"
      [columns]="employeeColumns"
      [actions]="employeeActions"
      emptyMessage="Aucun employé trouvé."
      (addClick)="openAddDialog()"
      (actionClick)="onTableAction($event)"
    ></app-generic-data-table>
  </div>

  <div class="modal-backdrop" *ngIf="isAddDialogOpen || isEditDialogOpen"></div>

  <div class="modal" *ngIf="isAddDialogOpen">
    <div class="modal__content">
      <div class="modal__header">
        <h2 class="modal__title">Ajouter un employé</h2>
      </div>

      <div class="form-grid">
        <div class="form-field">
          <label class="form-label">Prénom</label>
          <input class="input-field" [(ngModel)]="employeeFormData.firstname" />
        </div>

        <div class="form-field">
          <label class="form-label">Nom</label>
          <input class="input-field" [(ngModel)]="employeeFormData.lastname" />
        </div>

        <div class="form-field">
          <label class="form-label">Email</label>
          <input class="input-field" type="email" [(ngModel)]="employeeFormData.email" />
        </div>

        <div class="form-field">
          <label class="form-label">Rôle</label>
          <select class="select-field" [(ngModel)]="employeeFormData.role">
            <option [ngValue]="UserRole.STAFF">Personnel</option>
            <option [ngValue]="UserRole.ADMIN">Administrateur</option>
          </select>
        </div>

        <div class="form-field">
          <label class="form-label">Statut</label>
          <select class="select-field" [(ngModel)]="employeeFormData.status">
            <option [ngValue]="UserStatus.ACTIVE">Actif</option>
            <option [ngValue]="UserStatus.INACTIVE">Inactif</option>
          </select>
        </div>
      </div>

      <div class="modal__footer">
        <button class="button button--secondary" (click)="closeAddDialog()">Annuler</button>
        <button class="button button--primary" (click)="addEmployee()">Ajouter</button>
      </div>
    </div>
  </div>

  <div class="modal" *ngIf="isEditDialogOpen">
    <div class="modal__content">
      <div class="modal__header">
        <h2 class="modal__title">Modifier l'employé</h2>
      </div>

      <div class="form-grid">
        <div class="form-field">
          <label class="form-label">Prénom</label>
          <input class="input-field" [(ngModel)]="employeeFormData.firstname" />
        </div>

        <div class="form-field">
          <label class="form-label">Nom</label>
          <input class="input-field" [(ngModel)]="employeeFormData.lastname" />
        </div>

        <div class="form-field">
          <label class="form-label">Email</label>
          <input class="input-field" type="email" [(ngModel)]="employeeFormData.email" />
        </div>

        <div class="form-field">
          <label class="form-label">Rôle</label>
          <select class="select-field" [(ngModel)]="employeeFormData.role">
            <option [ngValue]="UserRole.STAFF">Personnel</option>
            <option [ngValue]="UserRole.ADMIN">Administrateur</option>
          </select>
        </div>

        <div class="form-field">
          <label class="form-label">Statut</label>
          <select class="select-field" [(ngModel)]="employeeFormData.status">
            <option [ngValue]="UserStatus.ACTIVE">Actif</option>
            <option [ngValue]="UserStatus.INACTIVE">Inactif</option>
          </select>
        </div>
      </div>

      <div class="modal__footer">
        <button class="button button--secondary" (click)="closeEditDialog()">Annuler</button>
        <button class="button button--primary" (click)="editEmployee()">Enregistrer</button>
      </div>
    </div>
  </div>
</div>

<ng-template #accessDenied>
  <div class="staff-page">
    <div class="card access-denied">
      <div class="access-denied__icon">🛡️</div>
      <h2 class="access-denied__title">Accès refusé</h2>
      <p class="access-denied__text">Vous n'avez pas les permissions nécessaires.</p>
    </div>
  </div>
</ng-template>
