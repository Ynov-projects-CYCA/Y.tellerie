<div class="staff-page">
  <div class="staff-page__header">
    <div>
      <h1 class="staff-page__title">Gestion des Chambres</h1>
      <p class="staff-page__subtitle">Gérez les chambres disponibles et occupées</p>
    </div>
  </div>

  <div class="stats-grid stats-grid--three">
    <div class="card">
      <div class="card__label">Total Chambres</div>
      <div class="card__value">{{ rooms.length }}</div>
    </div>

    <div class="card">
      <div class="card__label">Disponibles</div>
      <div class="card__value card__value--success">{{ availableCount }}</div>
    </div>

    <div class="card">
      <div class="card__label">Occupées</div>
      <div class="card__value card__value--danger">{{ occupiedCount }}</div>
    </div>
  </div>

  <div class="card">

  <app-generic-data-table
      title="Liste des chambres"
      subtitle="Recherche globale, tri et filtre par champ"
      addButtonLabel="Ajouter une chambre"
      [data]="tableRooms"
      [columns]="roomColumns"
      [actions]="roomActions"
      emptyMessage="Aucune chambre disponible."
      (addClick)="openAddDialog()"
      (actionClick)="onTableAction($event)"
    ></app-generic-data-table>
  </div>

  <div class="modal-backdrop" *ngIf="isAddDialogOpen"></div>

  <div class="modal" *ngIf="isAddDialogOpen">
    <div class="modal__content">
      <div class="modal__header">
        <h2 class="modal__title">Ajouter une chambre</h2>
        <p class="modal__subtitle">Renseignez les informations de la nouvelle chambre</p>
      </div>

      <div class="form-grid">
        <div class="form-field">
          <label class="form-label" for="room-number">Numéro</label>
          <input
            id="room-number"
            class="input-field"
            name="roomNumber"
            [(ngModel)]="newRoom.roomNumber"
            required
          />
        </div>

        <div class="form-field">
          <label class="form-label" for="room-type">Type</label>
          <select id="room-type" class="select-field" name="type" [(ngModel)]="newRoom.type">
            <option [ngValue]="RoomType.SIMPLE">Simple</option>
            <option [ngValue]="RoomType.DOUBLE">Double</option>
            <option [ngValue]="RoomType.SUITE">Suite</option>
          </select>
        </div>

        <div class="form-field">
          <label class="form-label" for="room-capacity">Capacité</label>
          <input
            id="room-capacity"
            class="input-field"
            type="number"
            name="capacity"
            min="1"
            max="10"
            [(ngModel)]="newRoom.capacity"
            required
          />
        </div>

        <div class="form-field">
          <label class="form-label" for="room-price">Prix</label>
          <input
            id="room-price"
            class="input-field"
            type="number"
            name="price"
            min="0"
            step="1"
            [(ngModel)]="newRoom.price"
            required
          />
        </div>

        <div class="form-field">
          <label class="form-label" for="room-currency">Devise</label>
          <input
            id="room-currency"
            class="input-field"
            name="currency"
            maxlength="3"
            [(ngModel)]="newRoom.currency"
          />
        </div>
      </div>

      <p class="form-error" *ngIf="addRoomError">{{ addRoomError }}</p>

      <div class="modal__footer">
        <button class="button button--secondary" type="button" (click)="closeAddDialog()">Annuler</button>
        <button
          class="button button--primary"
          type="button"
          [disabled]="isSaving || !newRoom.roomNumber || newRoom.capacity < 1 || newRoom.price < 0"
          (click)="addRoom()"
        >
          {{ isSaving ? 'Ajout...' : 'Ajouter' }}
        </button>
      </div>
    </div>
  </div>
</div>
