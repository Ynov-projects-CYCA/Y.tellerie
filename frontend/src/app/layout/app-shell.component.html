<div class="shell">
  <header class="shell__header">
    <a class="brand" routerLink="/">
      <span class="brand__eyebrow">Frontend foundation</span>
      <strong>{{ environment.appName }}</strong>
    </a>

    <nav class="shell__nav" aria-label="Navigation principale">
      <a routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">
        Accueil
      </a>
      <a routerLink="/integration" routerLinkActive="is-active">
        Contrat API
      </a>
    </nav>
  </header>

  <main class="shell__content">
    <router-outlet />
  </main>

  <footer class="shell__footer">
    <span>API cible: {{ environment.apiBaseUrl }}</span>
    <span>Token bearer prêt via intercepteur HTTP.</span>
  </footer>
</div>
