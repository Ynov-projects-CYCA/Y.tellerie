services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ytellerie-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - '${FRONTEND_PORT:-4200}:80'

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ytellerie-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-hotel_db}
      POSTGRES_USER: ${POSTGRES_USER:-hotel_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hotel_pass}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_DEFAULT_CURRENCY: ${STRIPE_DEFAULT_CURRENCY:-usd}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-http://localhost:4200/client/paiement/success}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-http://localhost:4200/client/paiement/cancel}
      MAILJET_API_KEY: ${MAILJET_API_KEY:-}
      MAILJET_API_SECRET: ${MAILJET_API_SECRET:-}
      MAILJET_SANDBOX: ${MAILJET_SANDBOX:-true}
      MAILJET_SENDER_EMAIL: ${MAILJET_SENDER_EMAIL:-}
      MAILJET_SENDER_NAME: ${MAILJET_SENDER_NAME:-Archi Hotel}
    command: sh -c "npm run migration:run:prod && npm run seed:prod && node dist/main"
    ports:
      - '${BACKEND_PORT:-3000}:3000'

  postgres:
    image: postgres:15-alpine
    container_name: ytellerie-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hotel_db}
      POSTGRES_USER: ${POSTGRES_USER:-hotel_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hotel_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-hotel_user} -d ${POSTGRES_DB:-hotel_db}']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ytellerie-pgadmin
    restart: unless-stopped
    profiles: ['tools']
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - '${PGADMIN_PORT:-5050}:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  stripe:
    image: stripe/stripe-cli:latest
    container_name: ytellerie-stripe
    restart: unless-stopped
    command: listen --forward-to backend:3000/stripe/webhook --api-key ${STRIPE_SECRET_KEY}
    depends_on:
      - backend

volumes:
  postgres_data:
  pgadmin_data:
